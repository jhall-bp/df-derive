# .github/workflows/bench.yml

name: Run Benchmarks

# Controls when the action will run.
on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
      ref:
        required: true
        type: string

# Avoid overlapping benchmark runs on the same ref.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  criterion:
    name: Criterion Benchmarks (report only)
    runs-on: ubuntu-22.04
    outputs:
      pages_report: ${{ steps.pages_report.outputs.exists }}

    env:
      CARGO_INCREMENTAL: '0'
      # Force consistent, optimized builds on CI
      # Pin to x86-64-v3 (AVX2 + BMI1/BMI2 + LZCNT + MOVBE) instead of `native` so bench
      # results are stable across heterogeneous GitHub Actions runners.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C target-cpu=x86-64-v3 -C codegen-units=1 -C opt-level=3 -C link-arg=-fuse-ld=bfd"
      # Pin parallelism for determinism
      RAYON_NUM_THREADS: '1'
      POLARS_MAX_THREADS: '1'
      CARGO_TERM_COLOR: always

    # Required for bencher/gha-adapter to comment on PRs and create checks.
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Fetch the main branch to compare against.
          # Set fetch-depth to 0 to fetch all history for all branches and tags.
          fetch-depth: 0

      # 2. Set up Rust toolchain and cache dependencies
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      # 3. Install Bencher CLI
      - name: Install Bencher CLI
        # Pin the action ref; the action still installs the latest CLI by
        # default for Bencher Cloud compatibility.
        uses: bencherdev/bencher@v0.6.6

      # 4. Run Criterion benchmarks and track with Bencher for visibility only.
      - name: Track Criterion benchmarks with Bencher
        continue-on-error: true
        run: |
          bencher run \
          --project df-derive \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --branch "${{ github.ref_name }}" \
          --testbed ubuntu-22.04-criterion \
          --adapter rust_criterion \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          "taskset -c 0 cargo bench --locked -p df-derive"

      # 5. Upload the HTML report as an artifact (only on `main` branch)
      # This prepares the report for deployment to GitHub Pages.
      - name: Check for Pages report
        id: pages_report
        if: inputs.event_name == 'push' && inputs.ref == 'refs/heads/main'
        run: |
          if [ -d target/criterion ] && [ -n "$(find target/criterion -mindepth 1 -print -quit)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        if: inputs.event_name == 'push' && inputs.ref == 'refs/heads/main' && steps.pages_report.outputs.exists == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          # The folder where the HTML report is generated.
          path: ./target/criterion/

  pages:
    name: Deploy Criterion Pages
    needs: criterion
    if: inputs.event_name == 'push' && inputs.ref == 'refs/heads/main' && needs.criterion.outputs.pages_report == 'true'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 6. Deploy the report to GitHub Pages (only on `main` branch)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  instruction-counts:
    name: Gungraun Instruction Counts
    runs-on: ubuntu-22.04

    env:
      CARGO_INCREMENTAL: '0'
      # Force consistent, optimized builds on CI
      # Pin to x86-64-v3 (AVX2 + BMI1/BMI2 + LZCNT + MOVBE) instead of `native` so bench
      # results are stable across heterogeneous GitHub Actions runners.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C target-cpu=x86-64-v3 -C codegen-units=1 -C opt-level=3 -C link-arg=-fuse-ld=bfd"
      # Pin parallelism for determinism
      RAYON_NUM_THREADS: '1'
      POLARS_MAX_THREADS: '1'
      CARGO_TERM_COLOR: always

    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y valgrind

      - name: Install matching Gungraun runner
        run: |
          gungraun_version="$(cargo pkgid --locked -p gungraun | sed 's/.*@//')"
          cargo install --version "$gungraun_version" gungraun-runner --locked

      - name: Install Bencher CLI
        # Pin the action ref; the action still installs the latest CLI by
        # default for Bencher Cloud compatibility.
        uses: bencherdev/bencher@v0.6.6

      - name: Track instruction-count benchmarks with Bencher
        run: |
          bencher run \
          --project df-derive \
          --token '${{ secrets.BENCHER_API_TOKEN }}' \
          --branch "${{ github.ref_name }}" \
          --testbed ubuntu-22.04-gungraun \
          --threshold-measure instructions \
          --threshold-test percentage \
          --threshold-max-sample-size 32 \
          --threshold-upper-boundary 0.02 \
          --thresholds-reset \
          --err \
          --adapter rust_gungraun \
          --github-actions '${{ secrets.GITHUB_TOKEN }}' \
          "cargo bench --locked -p df-derive --features bench-instruction-counts --bench instruction_counts"
