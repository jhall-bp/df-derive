# .github/workflows/publish.yml
name: Publish to crates.io

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Trigger on tags like v0.1.0, v1.2.3

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      # Keep publish dry-runs on GNU ld.bfd as well; the Polars-heavy
      # trybuild fixtures can otherwise trip rust-lld SIGBUS crashes on
      # GitHub-hosted Linux runners.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=bfd"
    environment:
      name: crates-io
    permissions:
      contents: read

    steps:
      - name: Clean up runner image
        run: |
          df -h
          rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run architecture tests
        env:
          CARGO_BUILD_JOBS: '1'
        run: cargo test --locked -p df-derive --test architecture --all-features -- --nocapture

      - name: Run trybuild tests
        env:
          CARGO_BUILD_JOBS: '1'
        run: cargo test --locked -p df-derive --test progress --all-features -- --nocapture

      - name: Run runtime tests
        env:
          CARGO_BUILD_JOBS: '1'
        run: cargo test --locked -p df-derive --test runtime_semantics --all-features -- --nocapture

      - name: Run unit and light tests
        env:
          CARGO_BUILD_JOBS: '1'
        run: >-
          cargo test --locked -p df-derive-core --all-features -- --nocapture &&
          cargo test --locked -p df-derive-macros --all-features -- --nocapture &&
          cargo test --locked -p df-derive --lib --all-features -- --nocapture &&
          cargo test --locked -p df-derive
          --test clippy_unsafe_derive_deserialize
          --test codegen_path_centralization
          --test generated_lint_hygiene
          --test idents_centralization
          --test local_runtime
          --all-features -- --nocapture

      - name: Check package contents
        run: cargo package --locked --workspace --list

      - name: Publish dry run
        run: cargo publish --locked --workspace --dry-run

      - name: Publish workspace to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --workspace
