name: CI

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - '**/*.md'
      - '*.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '*.md'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  msrv:
    name: MSRV check
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust 1.90
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check workspace
        run: cargo check --workspace --all-features --all-targets --locked

  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      # Avoid intermittent rust-lld SIGBUS crashes while linking the
      # Polars-heavy bench/test binaries on GitHub-hosted Linux runners. Use
      # Cargo's target-specific env vars so nested trybuild Cargo invocations
      # inherit the linker choice too.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=bfd"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: architecture
            command: cargo test --locked -p df-derive --test architecture --all-features -- --nocapture
          - name: trybuild
            command: cargo test --locked -p df-derive --test progress --all-features -- --nocapture
          - name: runtime
            command: cargo test --locked -p df-derive --test runtime_semantics --all-features -- --nocapture
          - name: unit-and-light
            command: >-
              cargo test --locked -p df-derive-core --all-features -- --nocapture &&
              cargo test --locked -p df-derive-macros --all-features -- --nocapture &&
              cargo test --locked -p df-derive --lib --all-features -- --nocapture &&
              cargo test --locked -p df-derive
              --test clippy_unsafe_derive_deserialize
              --test codegen_path_centralization
              --test generated_lint_hygiene
              --test idents_centralization
              --test local_runtime
              --all-features -- --nocapture
    env:
      CARGO_TERM_COLOR: always
      # Keep the test runner on GNU ld.bfd for the same reason as the lint job.
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=bfd"
    steps:
      - name: Clean up runner image
        run: |
          df -h
          rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Tests
        env:
          CARGO_BUILD_JOBS: '1'
        run: ${{ matrix.command }}

  package:
    name: Package dry run
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: cc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=bfd"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check package contents
        run: cargo package --locked --workspace --list

      - name: Publish dry run
        run: cargo publish --locked --workspace --dry-run

  bench:
    name: Benchmarks (after tests)
    needs:
      - lint
      - test
      - package
    if: ${{ needs.lint.result == 'success' && needs.test.result == 'success' && needs.package.result == 'success' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
      pages: write
      id-token: write
    uses: ./.github/workflows/bench.yml
    with:
      event_name: ${{ github.event_name }}
      ref: ${{ github.ref }}
    secrets: inherit
